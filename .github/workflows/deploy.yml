name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Optimize video for scroll seeking
        run: |
          ffmpeg -y -i public/videos/lufara_combined.mp4 \
            -g 1 \
            -keyint_min 1 \
            -sc_threshold 0 \
            -vcodec libx264 \
            -crf 23 \
            -preset fast \
            -movflags +faststart \
            -an \
            public/videos/lufara_optimized.mp4
          mv public/videos/lufara_optimized.mp4 public/videos/lufara_combined.mp4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
